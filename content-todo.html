<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Content Board V0.2.2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'IBM Plex Sans Thai','Segoe UI',sans-serif;background:#111;color:#f5f5f5;min-height:100vh;overflow-x:hidden}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}.topbar{position:sticky;top:0;z-index:50;background:#111;border-bottom:1px solid #292929;padding:10px 14px;display:grid;grid-template-columns:auto 1fr;gap:10px 12px;align-items:center}.brand{display:flex;gap:10px;align-items:center}.brand-mark{width:34px;height:34px;border-radius:10px;background:#f4f4ed;color:#111;display:flex;align-items:center;justify-content:center;font-weight:800}.brand-title{font-size:16px;font-weight:800}.brand-version{font-size:10px;color:#777}.conn-badge{position:fixed;top:14px;right:14px;z-index:9999;width:12px;height:12px;padding:0;border:0;background:transparent;overflow:visible;pointer-events:none}.conn-badge span:not(.conn-dot){display:none!important}.conn-dot{display:block;width:10px;height:10px;border-radius:50%;background:#777;box-shadow:0 0 0 4px rgba(255,255,255,.08)}.conn-badge.online .conn-dot{background:#2de38a;box-shadow:0 0 0 4px rgba(45,227,138,.16),0 0 14px rgba(45,227,138,.75)}.conn-badge.connecting .conn-dot{background:#f5a623;animation:blink 1s infinite}.conn-badge.offline .conn-dot{background:#ff5a5a}@keyframes blink{50%{opacity:.35}}.page-tabs{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#262620;border-radius:14px;padding:4px}.page-tab{height:42px;border:0;border-radius:10px;background:transparent;color:#777;font-weight:800;font-size:15px}.page-tab.active{background:#111;color:#fff}.hero{display:none}main{padding:18px 12px 70px}.plat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}.plat-pill{height:52px;border-radius:28px;border:1px solid #2d2d2d;background:#181814;color:#8f8f8f;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px}.plat-pill.active{background:#f4f4ed;color:#111}.plat-pill svg{width:18px;height:18px;fill:currentColor}.pill-cnt{background:#111;color:#777;border-radius:999px;padding:2px 9px;font-size:12px}.plat-pill.active .pill-cnt{background:rgba(255,255,255,.55);color:#fff}.stat-strip{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}.stat-chip{border:1px solid #303030;background:#181814;color:#9a9a9a;border-radius:18px;padding:10px 14px;font-size:15px}.stat-pip{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}.kanban{display:grid;gap:22px}.col-head{display:flex;align-items:center;gap:9px;color:#9a9a9a;font-size:17px;font-weight:800;margin-bottom:12px}.col-pip{width:8px;height:8px;border-radius:50%}.col-n{margin-left:auto;background:#2b2b27;color:#777;border-radius:999px;padding:2px 10px;font-size:13px}.card-stack{display:grid;gap:10px}.card{background:#1a1a18;border:1px solid #303030;border-radius:18px;padding:16px}.card-title{font-size:17px;font-weight:800;margin-bottom:12px}.card-cat{color:#777;font-size:15px;display:flex;gap:7px;align-items:center;margin-bottom:16px}.card-cat svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}.card-foot{display:grid;grid-template-columns:72px 1fr;gap:8px}.btn{height:42px;border-radius:12px;border:1px solid #303030;background:#111;color:#aaa;font-weight:800}.btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}.btn-promote{grid-column:auto;background:#111}.add-btn{width:100%;height:58px;margin-top:14px;border:2px dashed #393939;border-radius:18px;background:transparent;color:#777;font-size:17px;font-weight:800}.add-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}.empty-msg{color:#777;font-style:italic;padding:8px}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;padding:16px}.overlay.open{display:flex}.modal{background:#1a1a18;border:1px solid #303030;border-radius:22px;padding:20px;width:100%}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.modal-head h3{font-size:18px}.modal-close{width:38px;height:38px;border:1px solid #333;border-radius:12px;background:#111;color:#fff}.modal-close svg{width:16px;height:16px;stroke:currentColor}.field{margin-bottom:14px}.field label{display:block;color:#777;font-size:12px;font-weight:800;margin-bottom:6px}.field input{width:100%;height:46px;border:1px solid #333;border-radius:12px;background:#111;color:#fff;padding:0 12px}.modal-foot{display:grid;gap:10px}.modal-foot button{height:44px;border-radius:12px;border:1px solid #333;background:#111;color:#fff;font-weight:800}.modal-foot .btn-ok{background:#f4f4ed;color:#111}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:#f4f4ed;color:#111;border-radius:999px;padding:10px 18px;font-weight:800;z-index:400;opacity:0;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(min-width:821px){.topbar{display:flex;padding:12px 24px}.page-tabs{grid-column:auto;margin-left:auto;width:360px}.brand-mark{width:36px;height:36px}.hero{display:flex;justify-content:space-between;margin-bottom:20px}.hero h1{font-size:32px}.hero p{color:#777}.hero-mini{display:flex;gap:8px;color:#777}.hero-mini span{border:1px solid #333;border-radius:999px;padding:6px 10px}.plat-row{display:flex}.plat-pill{padding:0 18px}.stat-strip{display:flex}.kanban{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="topbar"><div class="brand"><div class="brand-mark">≡</div><div><div class="brand-title">Content Board</div><div class="brand-version">V0.2.2</div></div></div><div class="conn-badge connecting" id="conn-badge" title="กำลังเชื่อมต่อ"><span class="conn-dot"></span><span id="conn-text">กำลังเชื่อมต่อ</span></div><div class="page-tabs" id="page-tabs"></div></div>
<main><section class="hero"><div><h1>จัดคอนเทนต์ให้ง่ายขึ้น</h1><p>เลือกเพจ เลือกแพลตฟอร์ม แล้วเลื่อนงานจากยังไม่เสร็จไปจนถึงโพสต์แล้ว</p></div><div class="hero-mini"><span>Realtime</span><span>Mobile Ready</span><span>Firebase</span></div></section><div class="plat-row" id="plat-row"></div><div class="stat-strip" id="stat-strip"></div><div class="kanban" id="kanban"></div></main>
<div class="overlay" id="overlay"><div class="modal"><div class="modal-head"><h3 id="modal-title">เพิ่มงานใหม่</h3><button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="field"><label>ชื่องาน</label><input id="m-title" type="text" placeholder="เช่น เขียน caption สินค้าใหม่"></div><div class="field"><label>หมวดหมู่</label><input id="m-cat" type="text" placeholder="เช่น โปรโมชั่น, รีวิว"></div><div class="modal-foot"><button onclick="closeModal()">ยกเลิก</button><button class="btn-ok" id="btn-ok" onclick="confirmAdd()">เพิ่มงาน</button></div></div></div><div class="toast" id="toast"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getDatabase,ref,push,remove,update,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";const firebaseConfig={apiKey:"AIzaSyDdrt8dBkijsVleQdHD76SR7T061HMLgHA",authDomain:"to-do-list-19f58.firebaseapp.com",databaseURL:"https://to-do-list-19f58-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"to-do-list-19f58",storageBucket:"to-do-list-19f58.firebasestorage.app",messagingSenderId:"563635559663",appId:"1:563635559663:web:b3f24b954648fb646e4f1a"};const app=initializeApp(firebaseConfig),db=getDatabase(app),PAGES=['PSSP','JCP','TOC'],PLATS=[{key:'fb',label:'Facebook',color:'#185FA5',svg:'<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>'},{key:'ig',label:'Instagram',color:'#b5006b',svg:'<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/></svg>'},{key:'tt',label:'TikTok',color:'#777',svg:'<svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>'},{key:'yt',label:'YouTube',color:'#e60000',svg:'<svg viewBox="0 0 24 24"><path d="M22 7s-.2-1.6-.8-2.2c-.8-.8-1.7-.8-2.2-.9C15.9 3.7 12 3.7 12 3.7s-3.9 0-7 .2c-.5.1-1.4.1-2.2.9C2.2 5.4 2 7 2 7s-.2 1.9-.2 3.8v1.8c0 1.9.2 3.8.2 3.8s.2 1.6.8 2.2c.8.8 1.9.8 2.4.9 1.8.2 6.8.2 6.8.2s3.9 0 7-.3c.5 0 1.4-.1 2.2-.9.6-.6.8-2.2.8-2.2s.2-1.9.2-3.8v-1.8C22.2 8.9 22 7 22 7z"/></svg>'}],COLS=[{key:'todo',label:'ยังไม่เสร็จ',pip:'#b4b2a9'},{key:'done',label:'เสร็จแล้ว',pip:'#1D9E75'},{key:'posted',label:'โพสต์แล้ว',pip:'#185FA5'}],COL_KEYS=['todo','done','posted'];let curPage=0,curPlat='fb',addCol='todo',adding=false,cache={};onValue(ref(db,'.info/connected'),s=>{const online=s.val()===true,b=document.getElementById('conn-badge'),t=document.getElementById('conn-text'),txt=online?'ออนไลน์':'ออฟไลน์';b.className='conn-badge '+(online?'online':'offline');b.title=txt;t.textContent=txt});function listen(pi,pk){onValue(ref(db,`boards/p${pi}/${pk}`),s=>{const v=s.val()||{};cache[pi]??={};cache[pi][pk]??={};COL_KEYS.forEach(c=>cache[pi][pk][c]=v[c]||{});pi===curPage&&pk===curPlat?render():renderPlatRow()})}PAGES.forEach((_,pi)=>PLATS.forEach(p=>listen(pi,p.key)));function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function cards(pi,plat,col){const d=cache[pi]?.[plat]?.[col]||{};return Object.entries(d).map(([id,v])=>({id,...v})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))}function totalFor(pi,plat){return COL_KEYS.reduce((s,c)=>s+cards(pi,plat,c).length,0)}async function addCard(title,cat){await push(ref(db,`boards/p${curPage}/${curPlat}/${addCol}`),{title,cat,createdAt:Date.now()})}async function moveCard(f,id,to){const item=cache[curPage]?.[curPlat]?.[f]?.[id];if(!item)return;const u={};u[`boards/p${curPage}/${curPlat}/${f}/${id}`]=null;u[`boards/p${curPage}/${curPlat}/${to}/${id}`]=item;await update(ref(db),u)}async function delCard(c,id){await remove(ref(db,`boards/p${curPage}/${curPlat}/${c}/${id}`))}let toastTimer;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),2200)}window.openModal=c=>{addCol=c;document.getElementById('modal-title').textContent=`เพิ่มงาน — ${COLS.find(x=>x.key===c)?.label||c}`;document.getElementById('m-title').value='';document.getElementById('m-cat').value='';document.getElementById('overlay').classList.add('open')};window.closeModal=()=>document.getElementById('overlay').classList.remove('open');window.confirmAdd=async()=>{if(adding)return;const t=document.getElementById('m-title').value.trim(),c=document.getElementById('m-cat').value.trim()||'ทั่วไป';if(!t)return document.getElementById('m-title').focus();adding=true;try{closeModal();await addCard(t,c);toast('✓ เพิ่มงานแล้ว')}finally{adding=false}};window.promote=async(c,id)=>{const i=COL_KEYS.indexOf(c);if(i>=2)return;await moveCard(c,id,COL_KEYS[i+1]);toast('↑ ย้ายงานแล้ว')};window.demote=async(c,id)=>{const i=COL_KEYS.indexOf(c);if(i<=0)return;await moveCard(c,id,COL_KEYS[i-1]);toast('↓ ย้ายกลับแล้ว')};window.del=async(c,id)=>{if(confirm('ลบงานนี้?')){await delCard(c,id);toast('🗑 ลบงานแล้ว')}};window.switchPage=i=>{curPage=i;render();window.scrollTo({top:0,behavior:'smooth'})};window.switchPlat=k=>{curPlat=k;render()};document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});const IC={check:`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,undo:`<svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>`,trash:`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>`,plus:`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,tag:`<svg viewBox="0 0 24 24"><path d="M20 13l-7 7a2 2 0 0 1-3 0l-8-8V2h10l8 8a2 2 0 0 1 0 3z"/></svg>`};function renderPlatRow(){document.getElementById('plat-row').innerHTML=PLATS.map(p=>`<button class="plat-pill${curPlat===p.key?' active':''}" onclick="switchPlat('${p.key}')"><span style="color:${curPlat===p.key?'inherit':p.color}">${p.svg}</span>${esc(p.label)}<span class="pill-cnt">${totalFor(curPage,p.key)}</span></button>`).join('')}function render(){document.getElementById('page-tabs').innerHTML=PAGES.map((p,i)=>`<button class="page-tab${i===curPage?' active':''}" onclick="switchPage(${i})">${p}</button>`).join('');renderPlatRow();const td=cards(curPage,curPlat,'todo'),dn=cards(curPage,curPlat,'done'),po=cards(curPage,curPlat,'posted'),tot=td.length+dn.length+po.length;document.getElementById('stat-strip').innerHTML=[['#b4b2a9',`ค้างอยู่ ${td.length}`],['#1D9E75',`เสร็จแล้ว ${dn.length}`],['#185FA5',`โพสต์แล้ว ${po.length}`],[null,`รวม ${tot} งาน`]].map(([pip,l])=>`<div class="stat-chip">${pip?`<span class="stat-pip" style="background:${pip}"></span>`:''}${l}</div>`).join('');const data={todo:td,done:dn,posted:po};document.getElementById('kanban').innerHTML=COLS.map(col=>{const list=data[col.key],isFirst=col.key==='todo',isLast=col.key==='posted',label=col.key==='todo'?'เสร็จ':'โพสต์แล้ว';const html=list.length?list.map(t=>`<div class="card"><div class="card-title">${esc(t.title)}</div><div class="card-cat">${IC.tag}${esc(t.cat)}</div><div class="card-foot"><button class="btn" onclick="del('${col.key}','${t.id}')">${IC.trash}</button>${!isFirst?`<button class="btn" onclick="demote('${col.key}','${t.id}')">${IC.undo}</button>`:''}${!isLast?`<button class="btn btn-promote" onclick="promote('${col.key}','${t.id}')">✓ ${label}</button>`:''}</div></div>`).join(''):`<div class="empty-msg">ยังไม่มีงาน</div>`;return`<section class="col"><div class="col-head"><span class="col-pip" style="background:${col.pip}"></span>${col.label}<span class="col-n">${list.length}</span></div><div class="card-stack">${html}</div><button class="add-btn" onclick="openModal('${col.key}')">${IC.plus} เพิ่มงานใหม่</button></section>`}).join('')}render();
</script>
</body></html>
