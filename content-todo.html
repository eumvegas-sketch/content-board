<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00071a">
<title>Content Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#00071a;
  --bg2:#000d2e;
  --bg3:#001244;
  --surface:#001850;
  --surface2:#002266;
  --border:#003080;
  --border2:#0050c8;
  --text:#e8f0ff;
  --text2:#7a9fd4;
  --text3:#3a5a8a;
  --blue:#0070d1;
  --blue-bright:#00aaff;
  --ps-blue:#003791;
  --ps-blue2:#0070d1;
  --cross:#4fc3f7;
  --circle:#f48fb1;
  --triangle:#80cbc4;
  --square:#ce93d8;
  --glow-blue:0 0 20px rgba(0,170,255,.35);
  --glow-sm:0 0 10px rgba(0,170,255,.2);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r999:999px;
  --topbar-h:56px;--nav-h:68px;
}

html,body{height:100%;overflow-x:hidden;background:var(--bg)}
body{
  font-family:'IBM Plex Sans Thai',sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(0,55,145,.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(0,112,209,.25) 0%, transparent 60%),
    var(--bg);
  min-height:100vh;
}

/* scan-line overlay */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--topbar-h);padding:0 20px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(180deg,rgba(0,7,26,.98) 0%,rgba(0,7,26,.85) 100%);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}

.brand{display:flex;align-items:center;gap:10px}
.brand-ps{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--ps-blue),var(--ps-blue2));
  border-radius:var(--r8);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--glow-sm);
  flex-shrink:0;
}
.brand-ps svg{width:20px;height:20px;fill:white}
.brand-name{
  font-family:'Rajdhani',sans-serif;
  font-size:18px;font-weight:700;letter-spacing:.08em;
  color:var(--text);text-transform:uppercase;
}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:-2px}

/* connection */
.conn-badge{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:var(--r999);
  border:1px solid var(--border);
  background:rgba(0,24,80,.6);
  font-size:11px;font-weight:500;color:var(--text3);
  font-family:'IBM Plex Mono',monospace;transition:all .4s;
}
.conn-badge.online{border-color:rgba(0,200,100,.4);color:#00c864;background:rgba(0,40,20,.6)}
.conn-badge.offline{border-color:rgba(255,80,80,.4);color:#ff5050;background:rgba(40,0,0,.6)}
.conn-badge.connecting{color:#f5a623}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.conn-badge.online .conn-dot{background:#00c864;box-shadow:0 0 6px #00c864}
.conn-badge.offline .conn-dot{background:#ff5050}
.conn-badge.connecting .conn-dot{background:#f5a623;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* page tabs */
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.page-tabs{display:flex;gap:2px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--r8);padding:3px}
.page-tab{
  padding:4px 12px;border-radius:var(--r4);border:none;
  background:transparent;font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:600;letter-spacing:.06em;
  color:var(--text3);cursor:pointer;transition:all .2s;
  text-transform:uppercase;
}
.page-tab.active{
  background:linear-gradient(135deg,var(--ps-blue),var(--ps-blue2));
  color:white;box-shadow:var(--glow-sm);
}

/* ── MAIN ── */
main{
  position:relative;z-index:1;
  padding-top:calc(var(--topbar-h) + 16px);
  padding-bottom:calc(var(--nav-h) + 20px);
  padding-left:16px;padding-right:16px;
  max-width:1000px;margin:0 auto;
}
@media(min-width:641px){main{padding-bottom:32px;padding-left:24px;padding-right:24px}}

/* ── PLATFORM PILLS ── */
.plat-row{
  display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:4px;margin-bottom:16px;
}
.plat-row::-webkit-scrollbar{display:none}

.plat-pill{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:var(--r999);
  border:1px solid var(--border);
  background:rgba(0,24,80,.5);
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.plat-pill:active,.plat-pill:hover{border-color:var(--border2);color:var(--text)}
.plat-pill.active{
  background:linear-gradient(135deg,rgba(0,55,145,.8),rgba(0,112,209,.6));
  border-color:var(--blue-bright);color:white;
  box-shadow:var(--glow-sm);
}
.plat-pill svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.plat-pill.active .pill-cnt{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
.pill-cnt{
  font-size:11px;font-family:'IBM Plex Mono',monospace;
  background:rgba(0,0,0,.3);border-radius:var(--r999);
  padding:1px 7px;color:var(--text3);
}

/* ── STAT STRIP ── */
.stat-strip{
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  padding-bottom:2px;margin-bottom:20px;
}
.stat-strip::-webkit-scrollbar{display:none}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:var(--r999);
  border:1px solid var(--border);
  background:rgba(0,18,68,.6);
  font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;
}
.stat-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── COL TABS MOBILE ── */
.col-tabs{display:none;gap:4px;margin-bottom:16px}
.col-tab{
  flex:1;padding:8px 4px;border-radius:var(--r8);border:1px solid var(--border);
  background:rgba(0,18,68,.6);
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;font-weight:500;
  color:var(--text3);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:5px;
  -webkit-tap-highlight-color:transparent;
}
.col-tab.active{
  background:linear-gradient(135deg,rgba(0,55,145,.8),rgba(0,112,209,.5));
  border-color:var(--blue-bright);color:white;
  box-shadow:var(--glow-sm);
}
.col-tab-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.col-tab-n{
  font-size:10px;font-family:'IBM Plex Mono',monospace;
  background:rgba(0,0,0,.3);border-radius:var(--r999);padding:1px 5px;
}

@media(max-width:640px){
  .kanban{grid-template-columns:1fr!important}
  .col-tabs{display:flex}
  .col{display:none}
  .col.visible{display:flex;flex-direction:column}
}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}

.col-head{
  display:flex;align-items:center;gap:8px;
  font-family:'Rajdhani',sans-serif;
  font-size:12px;font-weight:700;color:var(--text3);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:12px;padding:0 2px;
}
.col-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-n{
  margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;
  background:rgba(0,0,0,.3);color:var(--text3);
  border:1px solid var(--border);
  border-radius:var(--r999);padding:1px 8px;
}

.card-stack{display:flex;flex-direction:column;gap:8px}

/* PS-style card */
.card{
  background:linear-gradient(135deg,rgba(0,18,68,.9) 0%,rgba(0,24,80,.7) 100%);
  border:1px solid var(--border);border-radius:var(--r12);
  padding:14px;
  transition:border-color .2s,box-shadow .2s;
  animation:fadeSlide .25s ease;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,170,255,.4),transparent);
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:active,.card:hover{border-color:var(--border2);box-shadow:var(--glow-sm)}

.card-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.45}
.card-cat{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--text3);margin-bottom:12px;
}
.card-cat svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2}

.card-foot{display:flex;gap:6px;align-items:center}

.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:32px;min-width:32px;
  border-radius:var(--r8);
  border:1px solid var(--border);
  background:rgba(0,0,0,.3);
  cursor:pointer;
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:12px;font-weight:500;color:var(--text2);
  gap:5px;padding:0 10px;
  transition:all .2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.btn:active,.btn:hover{background:rgba(0,55,145,.5);border-color:var(--border2);color:var(--text)}
.btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
.btn-promote{
  flex:1;
  background:linear-gradient(135deg,rgba(0,55,145,.4),rgba(0,112,209,.3));
  border-color:rgba(0,100,200,.5);color:var(--blue-bright);
}
.btn-promote:active,.btn-promote:hover{
  background:linear-gradient(135deg,rgba(0,55,145,.7),rgba(0,112,209,.5));
  box-shadow:var(--glow-sm);
}
.btn-del:active,.btn-del:hover{
  background:rgba(80,0,0,.5);border-color:rgba(255,80,80,.4);color:#ff8080;
}

/* PS button symbols */
.ps-sym{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;
  font-size:10px;font-weight:700;line-height:1;flex-shrink:0;
}
.sym-cross{color:var(--cross)}
.sym-circle{color:var(--circle)}

.add-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;margin-top:10px;
  padding:12px 14px;
  border:1px dashed rgba(0,80,200,.5);border-radius:var(--r12);
  background:rgba(0,12,40,.4);
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:13px;color:var(--text3);cursor:pointer;transition:all .2s;text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.add-btn:active,.add-btn:hover{
  background:rgba(0,24,80,.5);border-color:var(--border2);color:var(--text2);border-style:solid;
  box-shadow:var(--glow-sm);
}
.add-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
.empty-msg{font-size:13px;color:var(--text3);padding:10px 2px;font-style:italic;opacity:.7}

/* ── FAB ── */
.fab{
  display:none;
  position:fixed;right:18px;bottom:calc(var(--nav-h) + 16px);
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--ps-blue),var(--ps-blue2));
  border:none;cursor:pointer;
  align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,112,209,.5);
  transition:transform .15s,box-shadow .15s;z-index:40;
  -webkit-tap-highlight-color:transparent;
}
.fab:active{transform:scale(.9);box-shadow:0 2px 10px rgba(0,112,209,.4)}
.fab svg{width:22px;height:22px;fill:none;stroke:white;stroke-width:2.5}
@media(max-width:640px){.fab{display:flex}}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(0,7,26,.95);
  border-top:1px solid var(--border);
  height:var(--nav-h);
  padding-bottom:env(safe-area-inset-bottom);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.bottom-nav-inner{display:flex;align-items:center;justify-content:space-around;height:100%}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:6px 14px;border-radius:var(--r12);border:none;
  background:transparent;cursor:pointer;flex:1;
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:10px;font-weight:500;color:var(--text3);
  transition:all .2s;-webkit-tap-highlight-color:transparent;
  position:relative;
}
.nav-btn.active{color:var(--blue-bright)}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.nav-dot{
  position:absolute;top:4px;right:6px;
  min-width:16px;height:16px;border-radius:var(--r999);
  background:var(--blue-bright);color:#00071a;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  font-family:'IBM Plex Mono',monospace;
}
.nav-active-bar{
  position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:24px;height:2px;border-radius:1px;
  background:var(--blue-bright);box-shadow:0 0 8px var(--blue-bright);
  display:none;
}
.nav-btn.active .nav-active-bar{display:block}
@media(max-width:640px){.bottom-nav{display:flex}.conn-text-full{display:none}}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:200;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
@media(min-width:641px){.overlay{align-items:center}}

.modal{
  background:linear-gradient(160deg,rgba(0,20,70,.98) 0%,rgba(0,10,40,.98) 100%);
  border:1px solid var(--border2);
  border-radius:var(--r16) var(--r16) 0 0;
  padding:20px 20px calc(24px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;
  box-shadow:0 -4px 40px rgba(0,112,209,.3);
  animation:slideUp .25s cubic-bezier(.34,1.2,.64,1);
  position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--blue-bright),transparent);
}
@media(min-width:641px){
  .modal{border-radius:var(--r16);animation:popIn .2s cubic-bezier(.34,1.4,.64,1)}
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}

.modal-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);margin:0 auto 18px;display:block;
}
@media(min-width:641px){.modal-handle{display:none}}

.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-head h3{
  font-family:'Rajdhani',sans-serif;
  font-size:18px;font-weight:700;letter-spacing:.06em;
  color:var(--text);text-transform:uppercase;
}
.modal-close{
  width:30px;height:30px;border-radius:var(--r8);
  border:1px solid var(--border);background:rgba(0,0,0,.3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text3);-webkit-tap-highlight-color:transparent;transition:all .2s;
}
.modal-close:active,.modal-close:hover{border-color:var(--border2);color:var(--text)}
.modal-close svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5}

/* col selector */
.col-selector{display:flex;gap:6px;margin-bottom:16px}
.col-sel-btn{
  flex:1;padding:8px 6px;border-radius:var(--r8);
  border:1px solid var(--border);background:rgba(0,0,0,.3);
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;font-weight:500;
  color:var(--text3);cursor:pointer;transition:all .2s;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.col-sel-btn.active{
  background:linear-gradient(135deg,rgba(0,55,145,.8),rgba(0,112,209,.5));
  border-color:var(--blue-bright);color:white;box-shadow:var(--glow-sm);
}

.field{margin-bottom:14px}
.field label{
  display:block;font-size:11px;font-weight:600;
  color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;
  font-family:'Rajdhani',sans-serif;
}
.field input{
  width:100%;padding:11px 13px;
  border:1px solid var(--border);border-radius:var(--r8);
  background:rgba(0,0,0,.4);color:var(--text);
  font-size:16px;font-family:'IBM Plex Sans Thai',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.field input:focus{border-color:var(--blue-bright);box-shadow:0 0 0 3px rgba(0,170,255,.15)}
.field input::placeholder{color:var(--text3)}

.modal-foot{display:flex;gap:8px;margin-top:10px}
.modal-foot button{
  flex:1;padding:12px;border-radius:var(--r8);
  border:1px solid var(--border);background:rgba(0,0,0,.3);
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.modal-foot button:active,.modal-foot button:hover{background:rgba(0,24,80,.5)}
.modal-foot .btn-ok{
  background:linear-gradient(135deg,var(--ps-blue),var(--ps-blue2));
  border-color:var(--blue-bright);color:white;
  box-shadow:var(--glow-sm);
}
.modal-foot .btn-ok:disabled{opacity:.4;cursor:not-allowed}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,rgba(0,24,80,.95),rgba(0,55,145,.95));
  border:1px solid var(--border2);
  color:var(--text);
  padding:10px 20px;border-radius:var(--r999);
  font-size:13px;font-weight:500;
  box-shadow:var(--glow-blue);z-index:300;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(min-width:641px){.toast{bottom:24px}}

/* ── PREVIEW / SHARE ── */
.share-actions{
  display:flex;
  align-items:center;
  gap:6px;
}

.share-btn{
  height:32px;
  padding:0 12px;
  border-radius:var(--r8);
  border:1px solid var(--border);
  background:rgba(0,0,0,.3);
  color:var(--text2);
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}

.share-btn:hover,
.share-btn:active{
  background:rgba(0,55,145,.5);
  border-color:var(--border2);
  color:var(--text);
}

.share-btn.primary{
  background:linear-gradient(135deg,var(--ps-blue),var(--ps-blue2));
  border-color:var(--blue-bright);
  color:white;
  box-shadow:var(--glow-sm);
}

.preview-badge{
  display:none;
  align-items:center;
  gap:6px;
  padding:5px 10px;
  border-radius:var(--r999);
  border:1px solid rgba(0,170,255,.45);
  background:rgba(0,24,80,.75);
  color:var(--blue-bright);
  font-size:11px;
  font-family:'IBM Plex Mono',monospace;
  white-space:nowrap;
}

body.preview-mode .preview-badge{display:flex}
body.preview-mode .fab,
body.preview-mode .add-btn,
body.preview-mode .card-foot,
body.preview-mode .overlay{display:none!important}

@media(max-width:640px){
  .share-actions{gap:4px}
  .share-btn{height:30px;padding:0 8px;font-size:11px}
  .share-btn.copy-text{display:none}
  .preview-badge{display:none!important}
}

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-ps">
      <svg viewBox="0 0 24 24"><path d="M8.5 18.5V6.5l2.5.8v8.4l5-1.6V5.5l2.5.8V16l-10 3.5z"/></svg>
    </div>
    <div>
      <div class="brand-name">Content Board</div>
      <div class="brand-sub">Social Media Tracker</div>
    </div>
  </div>
  <div class="conn-badge connecting" id="conn-badge">
    <span class="conn-dot"></span>
    <span id="conn-text" class="conn-text-full">Connecting</span>
  </div>
  <div class="topbar-right">
    <div class="preview-badge" id="preview-badge">READ ONLY</div>
    <div class="share-actions">
      <button class="share-btn primary" id="preview-btn" type="button" onclick="openPreviewLink()">Preview</button>
      <button class="share-btn copy-text" id="copy-preview-btn" type="button" onclick="copyPreviewLink()">คัดลอกลิงก์</button>
    </div>
    <div class="page-tabs" id="page-tabs"></div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="plat-row" id="plat-row"></div>
  <div class="stat-strip" id="stat-strip"></div>
  <div class="col-tabs" id="col-tabs"></div>
  <div class="kanban" id="kanban"></div>
</main>

<!-- FAB -->
<button class="fab" id="fab" onclick="openModal('todo')" aria-label="เพิ่มงาน">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
</nav>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-head">
      <h3>New Task</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="col-selector" id="col-selector"></div>
    <div class="field">
      <label>ชื่องาน</label>
      <input id="m-title" type="text" placeholder="เช่น เขียน caption สินค้าใหม่" autocomplete="off"/>
    </div>
    <div class="field">
      <label>หมวดหมู่</label>
      <input id="m-cat" type="text" placeholder="เช่น โปรโมชั่น, รีวิว" autocomplete="off"/>
    </div>
    <div class="field">
      <label>ลิงก์แนบ (ไม่บังคับ)</label>
      <input id="m-link" type="url" placeholder="https://..." autocomplete="off"/>
    </div>
    <div class="modal-foot">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-ok" id="btn-ok" onclick="confirmAdd()">
        <span class="ps-sym sym-cross">✕</span> เพิ่มงาน
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, remove, update, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDdrt8dBkijsVleQdHD76SR7T061HMLgHA",
  authDomain:        "to-do-list-19f58.firebaseapp.com",
  databaseURL:       "https://to-do-list-19f58-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "to-do-list-19f58",
  storageBucket:     "to-do-list-19f58.firebasestorage.app",
  messagingSenderId: "563635559663",
  appId:             "1:563635559663:web:b3f24b954648fb646e4f1a",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const isPreviewMode = params.get('preview') === '1';

if(isPreviewMode){
  document.body.classList.add('preview-mode');
}

function getPreviewUrl(){
  const url = new URL(window.location.href);
  url.searchParams.set('preview','1');
  return url.toString();
}

function getEditUrl(){
  const url = new URL(window.location.href);
  url.searchParams.delete('preview');
  return url.toString();
}

window.openPreviewLink = () => {
  if(isPreviewMode){
    window.location.href = getEditUrl();
    return;
  }
  window.open(getPreviewUrl(), '_blank', 'noopener');
};

window.copyPreviewLink = async () => {
  const link = getPreviewUrl();
  try{
    await navigator.clipboard.writeText(link);
    toast('✓ คัดลอกลิงก์ Preview แล้ว');
  }catch(e){
    const tmp = document.createElement('input');
    tmp.value = link;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    toast('✓ คัดลอกลิงก์ Preview แล้ว');
  }
};

const PAGES = ['PSSP','JCP','TOC'];
const PLATS = [
  { key:'fb', label:'Facebook', color:'#4fc3f7',
    svg:'<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>',
    navSvg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>' },
  { key:'ig', label:'Instagram', color:'#f48fb1',
    svg:'<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.2"/></svg>',
    navSvg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>' },
  { key:'tt', label:'TikTok', color:'#80cbc4',
    svg:'<svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>',
    navSvg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>' },
  { key:'yt', label:'YouTube', color:'#ce93d8',
    svg:'<svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>',
    navSvg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="4"/><polygon points="10 11 16 14 10 17" fill="currentColor" stroke="none"/></svg>' },
];
const COLS = [
  { key:'todo',   label:'ยังไม่เสร็จ', pip:'#7a9fd4' },
  { key:'done',   label:'เสร็จแล้ว',   pip:'#00c864' },
  { key:'posted', label:'โพสต์แล้ว',  pip:'#4fc3f7' },
];
const COL_KEYS = ['todo','done','posted'];

let curPage=0, curPlat='fb', addCol='todo', curColMobile='todo', adding=false;
let cache={};

/* connection */
onValue(ref(db,'.info/connected'), snap => {
  const ok=snap.val()===true;
  const b=document.getElementById('conn-badge');
  const t=document.getElementById('conn-text');
  b.className='conn-badge '+(ok?'online':'offline');
  t.textContent=ok?'Online':'Offline';
});

/* listeners */
PAGES.forEach((_,pi) => PLATS.forEach(p => {
  onValue(ref(db,`boards/p${pi}/${p.key}`), snap => {
    const v=snap.val()||{};
    if(!cache[pi]) cache[pi]={};
    cache[pi][p.key]={todo:v.todo||{},done:v.done||{},posted:v.posted||{}};
    if(pi===curPage && p.key===curPlat) render();
    else renderPlatRow();
  });
}));

function cards(pi,plat,col){
  const d=cache[pi]?.[plat]?.[col]||{};
  return Object.entries(d).map(([id,v])=>({id,...v})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
}
function totalFor(pi,plat){return COL_KEYS.reduce((s,c)=>s+cards(pi,plat,c).length,0);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function addCard(title,cat,link){
  const data={title,cat,createdAt:Date.now()};
  if(link) data.link=link;
  await push(ref(db,`boards/p${curPage}/${curPlat}/${addCol}`),data);
}
async function moveCard(fromCol,id,toCol){
  const item=cache[curPage]?.[curPlat]?.[fromCol]?.[id];
  if(!item) return;
  const u={};
  u[`boards/p${curPage}/${curPlat}/${fromCol}/${id}`]=null;
  u[`boards/p${curPage}/${curPlat}/${toCol}/${id}`]=item;
  await update(ref(db),u);
}
async function delCard(col,id){await remove(ref(db,`boards/p${curPage}/${curPlat}/${col}/${id}`));}

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2200);
}

window.openModal = col => {
  if(isPreviewMode){toast('โหมด Preview ดูได้อย่างเดียว');return;}
  addCol=col; renderColSelector();
  document.getElementById('m-title').value='';
  document.getElementById('m-cat').value='';
  document.getElementById('m-link').value='';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-title').focus(),100);
};
window.closeModal = () => document.getElementById('overlay').classList.remove('open');
window.setAddCol  = col => { addCol=col; renderColSelector(); };
window.confirmAdd = async () => {
  if(isPreviewMode){toast('โหมด Preview ดูได้อย่างเดียว');return;}
  if(adding) return;
  const t=document.getElementById('m-title').value.trim();
  const c=document.getElementById('m-cat').value.trim()||'ทั่วไป';
  const l=document.getElementById('m-link').value.trim();
  if(!t){document.getElementById('m-title').focus();return;}
  adding=true;
  const ok=document.getElementById('btn-ok');
  ok.disabled=true; ok.textContent='Saving…';
  closeModal();
  await addCard(t,c,l);
  toast('✓ เพิ่มงานแล้ว');
  adding=false; ok.disabled=false; ok.innerHTML='<span class="ps-sym sym-cross">✕</span> เพิ่มงาน';
};
window.promote = async (col,id) => {
  if(isPreviewMode){toast('โหมด Preview ดูได้อย่างเดียว');return;}
  const i=COL_KEYS.indexOf(col); if(i>=2) return;
  await moveCard(col,id,COL_KEYS[i+1]); toast('▲ ย้ายงานแล้ว');
};
window.demote = async (col,id) => {
  if(isPreviewMode){toast('โหมด Preview ดูได้อย่างเดียว');return;}
  const i=COL_KEYS.indexOf(col); if(i<=0) return;
  await moveCard(col,id,COL_KEYS[i-1]); toast('▼ ย้ายกลับแล้ว');
};
window.del = async (col,id) => {
  if(isPreviewMode){toast('โหมด Preview ดูได้อย่างเดียว');return;}
  if(!confirm('ลบงานนี้?')) return;
  await delCard(col,id); toast('× ลบงานแล้ว');
};
window.switchPage = i => { curPage=i; render(); };
window.switchPlat = k => { curPlat=k; render(); };
window.switchColMobile = k => { curColMobile=k; renderKanban(); renderColTabs(); };

document.getElementById('m-title').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('m-cat').focus();});
document.getElementById('m-cat').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('m-link').focus();});
document.getElementById('m-link').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

const IC = {
  check:  `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  upload: `<svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`,
  undo:   `<svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>`,
  trash:  `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`,
  plus:   `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  tag:    `<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
  link:   `<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
};

function renderColSelector(){
  document.getElementById('col-selector').innerHTML=COLS.map(c=>`
    <button class="col-sel-btn${addCol===c.key?' active':''}" onclick="setAddCol('${c.key}')">${c.label}</button>
  `).join('');
}

function renderPlatRow(){
  document.getElementById('plat-row').innerHTML=PLATS.map(p=>`
    <button class="plat-pill${curPlat===p.key?' active':''}" onclick="switchPlat('${p.key}')">
      <span style="color:${curPlat===p.key?'white':p.color}">${p.svg}</span>
      ${esc(p.label)}<span class="pill-cnt">${totalFor(curPage,p.key)}</span>
    </button>`).join('');
}

function renderColTabs(){
  document.getElementById('col-tabs').innerHTML=COLS.map(c=>`
    <button class="col-tab${curColMobile===c.key?' active':''}" onclick="switchColMobile('${c.key}')">
      <span class="col-tab-pip" style="background:${c.pip}"></span>
      ${c.label}
      <span class="col-tab-n">${cards(curPage,curPlat,c.key).length}</span>
    </button>`).join('');
}

function renderKanban(){
  const colData={
    todo:cards(curPage,curPlat,'todo'),
    done:cards(curPage,curPlat,'done'),
    posted:cards(curPage,curPlat,'posted'),
  };
  document.getElementById('kanban').innerHTML=COLS.map(col=>{
    const list=colData[col.key];
    const isFirst=col.key==='todo', isLast=col.key==='posted';
    const promoteLabel=col.key==='todo'?'เสร็จ':'โพสต์แล้ว';
    const promoteIcon=col.key==='todo'?IC.check:IC.upload;
    const visible=col.key===curColMobile;

    const cardHTML=list.length===0
      ?`<div class="empty-msg">— ไม่มีงาน —</div>`
      :list.map(t=>`
        <div class="card">
          <div class="card-title">${esc(t.title)}</div>
          <div class="card-cat">${IC.tag} ${esc(t.cat)}</div>
          ${t.link?`<a class="card-link" href="${t.link}" target="_blank" rel="noopener">${IC.link} <span>${new URL(t.link).hostname.replace('www.','')}</span></a>`:''}
          ${!isPreviewMode ? `
          <div class="card-foot">
            <button class="btn btn-del" onclick="del('${col.key}','${t.id}')">${IC.trash}</button>
            ${!isFirst?`<button class="btn" onclick="demote('${col.key}','${t.id}')">${IC.undo}</button>`:''}
            ${!isLast?`<button class="btn btn-promote" onclick="promote('${col.key}','${t.id}')">${promoteIcon} ${promoteLabel}</button>`:''}
          </div>` : ''}
        </div>`).join('');

    return `
      <div class="col${visible?' visible':''}">
        <div class="col-head">
          <span class="col-pip" style="background:${col.pip}"></span>
          ${col.label}<span class="col-n">${list.length}</span>
        </div>
        <div class="card-stack">${cardHTML}</div>
        ${!isPreviewMode ? `<button class="add-btn" onclick="openModal('${col.key}')">${IC.plus} เพิ่มงานใหม่</button>` : ''}
      </div>`;
  }).join('');
}

function renderBottomNav(){
  document.getElementById('bottom-nav-inner').innerHTML=PLATS.map(p=>{
    const cnt=totalFor(curPage,p.key);
    const active=curPlat===p.key;
    return `
      <div class="nav-btn-wrap">
        <button class="nav-btn${active?' active':''}" onclick="switchPlat('${p.key}')">
          ${p.navSvg}
          ${p.label}
          <span class="nav-active-bar"></span>
        </button>
        ${cnt>0?`<span class="nav-dot">${cnt>9?'9+':cnt}</span>`:''}
      </div>`;
  }).join('');
}

function render(){
  document.getElementById('page-tabs').innerHTML=PAGES.map((pg,i)=>
    `<button class="page-tab${i===curPage?' active':''}" onclick="switchPage(${i})">${pg}</button>`
  ).join('');
  renderPlatRow();
  const td=cards(curPage,curPlat,'todo');
  const dn=cards(curPage,curPlat,'done');
  const po=cards(curPage,curPlat,'posted');
  const tot=td.length+dn.length+po.length;
  document.getElementById('stat-strip').innerHTML=[
    ['#7a9fd4',`ค้างอยู่ ${td.length}`],
    ['#00c864',`เสร็จแล้ว ${dn.length}`],
    ['#4fc3f7',`โพสต์แล้ว ${po.length}`],
    [null,`รวม ${tot} งาน`],
  ].map(([pip,label])=>`
    <div class="stat-chip">
      ${pip?`<span class="stat-pip" style="background:${pip}"></span>`:''}${label}
    </div>`).join('');
  renderColTabs();
  renderKanban();
  renderBottomNav();
  renderColSelector();

  const previewBtn=document.getElementById('preview-btn');
  const copyBtn=document.getElementById('copy-preview-btn');
  if(previewBtn) previewBtn.textContent=isPreviewMode?'กลับโหมดแก้ไข':'Preview';
  if(copyBtn) copyBtn.style.display=isPreviewMode?'none':'';
}

render();
</script>
</body>
</html>
