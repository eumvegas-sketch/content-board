<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content To-do Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e4e4e0;
    --border-strong: #c8c8c2;
    --text: #1a1a18;
    --text-2: #6b6b65;
    --text-3: #9e9e97;
    --todo-dot: #b4b2a9;
    --done-dot: #1D9E75;
    --posted-dot: #185FA5;
    --todo-bg: #f7f7f5;
    --done-bg: #f0faf5;
    --posted-bg: #eef5fc;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-pill: 20px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: #2e2e2b;
      --border-strong: #444441;
      --text: #f0f0ec;
      --text-2: #9e9e97;
      --text-3: #5f5e5a;
      --todo-bg: #1a1a18;
      --done-bg: #0e1f18;
      --posted-bg: #0c1a28;
    }
  }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 20px 48px;
  }

  header {
    max-width: 960px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--text);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; fill: var(--bg); }

  h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .page-switcher {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 3px;
  }

  .page-btn {
    padding: 5px 14px;
    border-radius: var(--radius-pill);
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Sarabun', sans-serif;
    color: var(--text-2);
    cursor: pointer;
    transition: all .2s;
  }

  .page-btn.active {
    background: var(--text);
    color: var(--bg);
  }

  .board { max-width: 960px; margin: 0 auto; }

  .plat-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .plat-tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Sarabun', sans-serif;
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s;
  }

  .plat-tab:hover { border-color: var(--border-strong); color: var(--text); }

  .plat-tab.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .plat-tab.active .plat-cnt { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); }

  .plat-tab svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

  .plat-cnt {
    font-size: 11px;
    background: var(--bg);
    border-radius: var(--radius-pill);
    padding: 1px 7px;
    color: var(--text-3);
    font-weight: 500;
  }

  .summary-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .sum-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-2);
    background: var(--surface);
  }

  .sum-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .kanban {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  @media (max-width: 640px) {
    .kanban { grid-template-columns: 1fr; }
  }

  .col { display: flex; flex-direction: column; }

  .col-head {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .col-head .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .col-cnt {
    margin-left: auto;
    font-size: 11px;
    background: var(--border);
    color: var(--text-3);
    border-radius: var(--radius-pill);
    padding: 1px 7px;
    font-weight: 500;
  }

  .card-list { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    transition: border-color .15s;
  }

  .card:hover { border-color: var(--border-strong); }

  .card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.4; }

  .card-cat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  .card-cat svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; }

  .card-actions { display: flex; gap: 6px; }

  .act-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    min-width: 28px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    gap: 4px;
    padding: 0 8px;
    transition: all .15s;
    white-space: nowrap;
  }

  .act-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border-strong); }

  .act-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; }

  .act-btn.promote {
    flex: 1;
    background: var(--bg);
  }

  .act-btn.del:hover { background: #fff0f0; border-color: #fca5a5; color: #dc2626; }

  @media (prefers-color-scheme: dark) {
    .act-btn.del:hover { background: #2a1010; border-color: #7f1d1d; color: #f87171; }
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    width: 100%;
    margin-top: 8px;
    padding: 9px 12px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    background: transparent;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    color: var(--text-3);
    cursor: pointer;
    transition: all .15s;
    text-align: left;
  }

  .add-btn:hover { background: var(--surface); color: var(--text-2); border-color: var(--border-strong); border-style: solid; }

  .add-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; flex-shrink: 0; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 320px;
    animation: pop .15s ease;
  }

  @keyframes pop { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px; }

  .modal label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; }

  .modal input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    margin-bottom: 10px;
    outline: none;
    transition: border-color .15s;
  }

  .modal input:focus { border-color: var(--border-strong); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  .modal-actions button {
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s;
  }

  .modal-actions button:hover { background: var(--bg); }

  .modal-actions .btn-confirm {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .modal-actions .btn-confirm:hover { opacity: .85; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20"><path d="M3 5h14M3 10h14M3 15h8"/></svg>
    </div>
    <h1>Content To-do Board</h1>
  </div>
  <div class="page-switcher" id="page-switcher"></div>
</header>

<div class="board">
  <div class="plat-tabs" id="plat-tabs"></div>
  <div class="summary-row" id="summary-row"></div>
  <div class="kanban" id="kanban"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">เพิ่มงานใหม่</h3>
    <label>ชื่องาน</label>
    <input id="m-title" type="text" placeholder="เช่น เขียน caption สินค้าใหม่" />
    <label>หมวดหมู่</label>
    <input id="m-cat" type="text" placeholder="เช่น โปรโมชั่น, รีวิว" />
    <div class="modal-actions">
      <button onclick="closeModal()">ยกเลิก</button>
      <button class="btn-confirm" onclick="confirmAdd()">เพิ่ม</button>
    </div>
  </div>
</div>

<script>
const PAGES = ['เพจ 1','เพจ 2','เพจ 3'];

const PLATS = [
  { key:'fb', label:'Facebook', color:'#185FA5',
    svg:'<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>' },
  { key:'ig', label:'Instagram', color:'#993556',
    svg:'<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>' },
  { key:'tt', label:'TikTok', color:'#444441',
    svg:'<svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>' },
  { key:'yt', label:'YouTube', color:'#A32D2D',
    svg:'<svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>' },
];

const COL_ORDER = ['todo','done','posted'];
const COL_META = {
  todo:   { label:'ยังไม่เสร็จ', dot:'#b4b2a9' },
  done:   { label:'เสร็จแล้ว',   dot:'#1D9E75' },
  posted: { label:'โพสต์แล้ว',  dot:'#185FA5' },
};

let curPage = 0;
let curPlat = 'fb';
let addCol  = 'todo';

function makePageData() {
  const d = {};
  PLATS.forEach(p => { d[p.key] = { todo:[], done:[], posted:[] }; });
  return d;
}

let state = PAGES.map(() => makePageData());

function total(platKey) {
  const d = state[curPage][platKey];
  return d.todo.length + d.done.length + d.posted.length;
}

function promote(col, idx) {
  const cur = COL_ORDER.indexOf(col);
  if (cur >= 2) return;
  const next = COL_ORDER[cur + 1];
  const item = state[curPage][curPlat][col].splice(idx, 1)[0];
  state[curPage][curPlat][next].push(item);
  render();
}

function demote(col, idx) {
  const cur = COL_ORDER.indexOf(col);
  if (cur <= 0) return;
  const prev = COL_ORDER[cur - 1];
  const item = state[curPage][curPlat][col].splice(idx, 1)[0];
  state[curPage][curPlat][prev].push(item);
  render();
}

function del(col, idx) {
  if (!confirm('ลบงานนี้?')) return;
  state[curPage][curPlat][col].splice(idx, 1);
  render();
}

function openModal(col) {
  addCol = col;
  document.getElementById('modal-title').textContent = 'เพิ่มงานใหม่ — ' + COL_META[col].label;
  document.getElementById('m-title').value = '';
  document.getElementById('m-cat').value = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-title').focus(), 50);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function confirmAdd() {
  const t = document.getElementById('m-title').value.trim();
  const c = document.getElementById('m-cat').value.trim() || 'ทั่วไป';
  if (!t) { document.getElementById('m-title').focus(); return; }
  state[curPage][curPlat][addCol].push({ title: t, cat: c });
  closeModal();
  render();
}

document.getElementById('m-title').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('m-cat').focus(); });
document.getElementById('m-cat').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAdd(); });
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const icons = {
  edit:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  check:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  upload:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`,
  undo:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>`,
  trash:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
  plus:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  tag:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
};

function render() {
  document.getElementById('page-switcher').innerHTML = PAGES.map((pg, i) =>
    `<button class="page-btn${i === curPage ? ' active' : ''}" onclick="curPage=${i};render()">${pg}</button>`
  ).join('');

  document.getElementById('plat-tabs').innerHTML = PLATS.map(p =>
    `<button class="plat-tab${curPlat === p.key ? ' active' : ''}" onclick="curPlat='${p.key}';render()" style="${curPlat === p.key ? '' : `--icon-color:${p.color}`}">
      <span style="color:${curPlat === p.key ? 'inherit' : p.color}">${p.svg}</span>
      ${esc(p.label)}
      <span class="plat-cnt">${total(p.key)}</span>
    </button>`
  ).join('');

  const d = state[curPage][curPlat];
  const tot = d.todo.length + d.done.length + d.posted.length;
  document.getElementById('summary-row').innerHTML = `
    <div class="sum-pill"><span class="sum-dot" style="background:${COL_META.todo.dot}"></span>ค้างอยู่ ${d.todo.length}</div>
    <div class="sum-pill"><span class="sum-dot" style="background:${COL_META.done.dot}"></span>เสร็จแล้ว ${d.done.length}</div>
    <div class="sum-pill"><span class="sum-dot" style="background:${COL_META.posted.dot}"></span>โพสต์แล้ว ${d.posted.length}</div>
    <div class="sum-pill">รวม ${tot} งาน</div>
  `;

  document.getElementById('kanban').innerHTML = COL_ORDER.map(colKey => {
    const meta = COL_META[colKey];
    const cards = d[colKey].map((task, i) => {
      const isFirst = colKey === 'todo';
      const isLast  = colKey === 'posted';
      const promoteLabel = colKey === 'todo' ? 'เสร็จ' : 'โพสต์แล้ว';
      const promoteIcon  = colKey === 'todo' ? icons.check : icons.upload;
      return `
        <div class="card">
          <div class="card-title">${esc(task.title)}</div>
          <div class="card-cat">${icons.tag} ${esc(task.cat)}</div>
          <div class="card-actions">
            <button class="act-btn del" onclick="del('${colKey}',${i})" title="ลบ">${icons.trash}</button>
            ${!isFirst ? `<button class="act-btn" onclick="demote('${colKey}',${i})" title="ย้อนกลับ">${icons.undo}</button>` : ''}
            ${!isLast  ? `<button class="act-btn promote" onclick="promote('${colKey}',${i})">${promoteIcon} ${promoteLabel}</button>` : ''}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="col">
        <div class="col-head">
          <span class="col-dot" style="background:${meta.dot}"></span>
          ${meta.label}
          <span class="col-cnt">${d[colKey].length}</span>
        </div>
        <div class="card-list">${cards}</div>
        <button class="add-btn" onclick="openModal('${colKey}')">${icons.plus} เพิ่มงานใหม่</button>
      </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
