<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#0f0f0d;
  --ink2:#4a4a45;
  --ink3:#9a9a93;
  --paper:#fafaf7;
  --surface:#ffffff;
  --border:#e8e8e2;
  --border2:#d0d0c8;
  --accent:#1a6b3c;
  --accent-bg:#edf7f1;
  --blue:#1a4a8a;
  --blue-bg:#edf2fb;
  --amber:#8a5a1a;
  --amber-bg:#fdf5e8;
  --red:#8a1a1a;
  --red-bg:#fdf0f0;
  --r4:4px;--r8:8px;--r12:12px;--r20:20px;--r999:999px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}

@media(prefers-color-scheme:dark){
  :root{
    --ink:#f0f0ea;--ink2:#a0a098;--ink3:#606058;
    --paper:#111110;--surface:#1a1a18;--border:#2a2a26;--border2:#3a3a36;
    --accent:#3dd68c;--accent-bg:#0d2a1a;
    --blue:#5b9cf6;--blue-bg:#0d1a2e;
    --amber:#f5a623;--amber-bg:#2a1e0a;
    --red:#f56565;--red-bg:#2a0d0d;
  }
}

body{
  font-family:'IBM Plex Sans Thai',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding:0;
}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--paper);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:54px;
  display:flex;align-items:center;gap:16px;
}

.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-mark{
  width:30px;height:30px;
  background:var(--ink);
  border-radius:var(--r8);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.brand-mark svg{width:16px;height:16px;stroke:var(--paper);fill:none;stroke-width:2;stroke-linecap:round}
.brand-name{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.01em}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* connection badge */
.conn-badge{
  display:flex;align-items:center;gap:7px;
  padding:5px 11px;
  border-radius:var(--r999);
  border:1px solid var(--border);
  background:var(--surface);
  font-size:12px;font-weight:500;
  color:var(--ink3);
  font-family:'IBM Plex Mono',monospace;
  transition:all .3s;
  cursor:default;
}
.conn-badge.connecting{border-color:var(--border2);color:var(--amber)}
.conn-badge.online{border-color:#b8e6cf;background:var(--accent-bg);color:var(--accent)}
.conn-badge.offline{border-color:#f5c6c6;background:var(--red-bg);color:var(--red)}
.conn-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--ink3);flex-shrink:0;
  transition:background .3s;
}
.conn-badge.connecting .conn-dot{background:var(--amber);animation:blink 1.2s ease-in-out infinite}
.conn-badge.online .conn-dot{background:var(--accent)}
.conn-badge.offline .conn-dot{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* page tabs */
.page-tabs{display:flex;gap:2px;background:var(--border);border-radius:var(--r8);padding:3px}
.page-tab{
  padding:4px 13px;border-radius:var(--r4);border:none;
  background:transparent;font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s;
}
.page-tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ── MAIN ── */
main{max-width:980px;margin:0 auto;padding:24px 20px 60px}

/* platform pills */
.plat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.plat-pill{
  display:flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:var(--r999);
  border:1px solid var(--border);background:var(--surface);
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;
  transition:all .15s;
}
.plat-pill:hover{border-color:var(--border2);color:var(--ink)}
.plat-pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.plat-pill svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.plat-pill.active .pill-cnt{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.pill-cnt{
  font-size:11px;font-weight:500;font-family:'IBM Plex Mono',monospace;
  background:var(--paper);border-radius:var(--r999);
  padding:1px 7px;color:var(--ink3);
}

/* summary strip */
.stat-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:var(--r999);
  border:1px solid var(--border);background:var(--surface);
  font-size:12px;color:var(--ink2);
}
.stat-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* kanban grid */
.kanban{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
@media(max-width:600px){.kanban{grid-template-columns:1fr}}

.col{}
.col-head{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:600;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:10px;padding:0 2px;
}
.col-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-n{
  margin-left:auto;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  background:var(--border);color:var(--ink3);
  border-radius:var(--r999);padding:1px 7px;
}

.card-stack{display:flex;flex-direction:column;gap:8px}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r12);padding:13px 14px;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  animation:slideIn .2s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow)}

.card-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:5px;line-height:1.45}
.card-cat{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--ink3);margin-bottom:11px;
}
.card-cat svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2}

.card-foot{display:flex;gap:6px;align-items:center}

.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:27px;min-width:27px;
  border-radius:var(--r8);border:1px solid var(--border);
  background:transparent;cursor:pointer;
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:12px;font-weight:500;color:var(--ink2);
  gap:4px;padding:0 9px;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--paper);color:var(--ink);border-color:var(--border2)}
.btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
.btn-promote{flex:1;background:var(--paper)}
.btn-del:hover{background:var(--red-bg);border-color:#f5c6c6;color:var(--red)}

/* add button */
.add-btn{
  display:flex;align-items:center;gap:7px;
  width:100%;margin-top:8px;
  padding:10px 13px;
  border:1.5px dashed var(--border2);
  border-radius:var(--r12);background:transparent;
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:13px;color:var(--ink3);cursor:pointer;
  transition:all .15s;text-align:left;
}
.add-btn:hover{background:var(--surface);color:var(--ink2);border-color:var(--ink3);border-style:solid}
.add-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}

.empty-msg{font-size:12px;color:var(--ink3);padding:6px 2px;font-style:italic}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);backdrop-filter:blur(4px);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}

.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r12);padding:24px;
  width:100%;max-width:340px;
  box-shadow:var(--shadow-md);
  animation:pop .18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-head h3{font-size:15px;font-weight:600;color:var(--ink)}
.modal-close{
  width:28px;height:28px;border-radius:var(--r8);
  border:1px solid var(--border);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink3);transition:all .15s;
}
.modal-close:hover{background:var(--paper);color:var(--ink)}
.modal-close svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input{
  width:100%;padding:9px 11px;
  border:1px solid var(--border);border-radius:var(--r8);
  background:var(--paper);color:var(--ink);
  font-size:13px;font-family:'IBM Plex Sans Thai',sans-serif;
  outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--ink)}

.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.modal-foot button{
  padding:8px 18px;border-radius:var(--r8);
  border:1px solid var(--border);background:transparent;
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s;
}
.modal-foot button:hover{background:var(--paper)}
.modal-foot .btn-ok{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.modal-foot .btn-ok:hover{opacity:.85}
.modal-foot .btn-ok:disabled{opacity:.5;cursor:not-allowed}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:var(--paper);
  padding:9px 18px;border-radius:var(--r999);
  font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);
  z-index:300;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 20 20"><path d="M4 6h12M4 10h12M4 14h7"/></svg>
    </div>
    <span class="brand-name">Content Board</span>
  </div>

  <div class="conn-badge connecting" id="conn-badge">
    <span class="conn-dot"></span>
    <span id="conn-text">กำลังเชื่อมต่อ</span>
  </div>

  <div class="topbar-right">
    <div class="page-tabs" id="page-tabs"></div>
  </div>
</div>

<main>
  <div class="plat-row" id="plat-row"></div>
  <div class="stat-strip" id="stat-strip"></div>
  <div class="kanban" id="kanban"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">เพิ่มงานใหม่</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="field">
      <label>ชื่องาน</label>
      <input id="m-title" type="text" placeholder="เช่น เขียน caption สินค้าใหม่" />
    </div>
    <div class="field">
      <label>หมวดหมู่</label>
      <input id="m-cat" type="text" placeholder="เช่น โปรโมชั่น, รีวิว" />
    </div>
    <div class="modal-foot">
      <button onclick="closeModal()">ยกเลิก</button>
      <button class="btn-ok" id="btn-ok" onclick="confirmAdd()">เพิ่มงาน</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, remove, update, onValue, onDisconnect, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── CONFIG ─────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "AIzaSyDdrt8dBkijsVleQdHD76SR7T061HMLgHA",
  authDomain:        "to-do-list-19f58.firebaseapp.com",
  databaseURL:       "https://to-do-list-19f58-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "to-do-list-19f58",
  storageBucket:     "to-do-list-19f58.firebasestorage.app",
  messagingSenderId: "563635559663",
  appId:             "1:563635559663:web:b3f24b954648fb646e4f1a",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ── CONSTANTS ───────────────────────────────────────────────────── */
const PAGES = ['เพจ 1','เพจ 2','เพจ 3'];
const PLATS = [
  { key:'fb', label:'Facebook', color:'#185FA5',
    svg:'<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>' },
  { key:'ig', label:'Instagram', color:'#b5006b',
    svg:'<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.2"/></svg>' },
  { key:'tt', label:'TikTok', color:'#555',
    svg:'<svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>' },
  { key:'yt', label:'YouTube', color:'#cc0000',
    svg:'<svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="white"/></svg>' },
];
const COLS = [
  { key:'todo',   label:'ยังไม่เสร็จ', pip:'#b4b2a9' },
  { key:'done',   label:'เสร็จแล้ว',   pip:'#1D9E75' },
  { key:'posted', label:'โพสต์แล้ว',  pip:'#185FA5' },
];
const COL_KEYS = ['todo','done','posted'];

/* ── STATE ───────────────────────────────────────────────────────── */
let curPage = 0;
let curPlat = 'fb';
let addCol  = 'todo';
let adding  = false;
let cache   = {};   // cache[page][plat][col] = { id: {title,cat,...} }

/* ── CONNECTION STATUS ───────────────────────────────────────────── */
const connRef = ref(db, '.info/connected');
onValue(connRef, snap => {
  const online = snap.val() === true;
  const badge  = document.getElementById('conn-badge');
  const text   = document.getElementById('conn-text');
  badge.className = 'conn-badge ' + (online ? 'online' : 'offline');
  text.textContent = online ? 'เชื่อมต่อแล้ว' : 'ออฟไลน์';
});

/* ── REALTIME LISTENERS ──────────────────────────────────────────── */
function listen(pi, platKey) {
  onValue(ref(db, `boards/p${pi}/${platKey}`), snap => {
    const val = snap.val() || {};
    if (!cache[pi])         cache[pi]         = {};
    if (!cache[pi][platKey]) cache[pi][platKey] = {};
    COL_KEYS.forEach(c => { cache[pi][platKey][c] = val[c] || {}; });
    if (pi === curPage && platKey === curPlat) render();
    else renderPlatRow();   // update counts on other tabs
  });
}

PAGES.forEach((_, pi) => PLATS.forEach(p => listen(pi, p.key)));

/* ── HELPERS ─────────────────────────────────────────────────────── */
function cards(pi, plat, col) {
  const d = cache[pi]?.[plat]?.[col] || {};
  return Object.entries(d).map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
}
function totalFor(pi, plat) {
  return COL_KEYS.reduce((s, c) => s + cards(pi, plat, c).length, 0);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── MUTATIONS ───────────────────────────────────────────────────── */
async function addCard(title, cat) {
  await push(ref(db, `boards/p${curPage}/${curPlat}/${addCol}`), {
    title, cat, createdAt: Date.now()
  });
}
async function moveCard(fromCol, id, toCol) {
  const item = cache[curPage]?.[curPlat]?.[fromCol]?.[id];
  if (!item) return;
  const u = {};
  u[`boards/p${curPage}/${curPlat}/${fromCol}/${id}`] = null;
  u[`boards/p${curPage}/${curPlat}/${toCol}/${id}`]   = item;
  await update(ref(db), u);
}
async function delCard(col, id) {
  await remove(ref(db, `boards/p${curPage}/${curPlat}/${col}/${id}`));
}

/* ── TOAST ───────────────────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── MODAL ───────────────────────────────────────────────────────── */
window.openModal = col => {
  addCol = col;
  const colLabel = COLS.find(c => c.key === col)?.label || col;
  document.getElementById('modal-title').textContent = `เพิ่มงาน — ${colLabel}`;
  document.getElementById('m-title').value = '';
  document.getElementById('m-cat').value   = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-title').focus(), 60);
};
window.closeModal = () => document.getElementById('overlay').classList.remove('open');
window.confirmAdd = async () => {
  if (adding) return;
  const t = document.getElementById('m-title').value.trim();
  const c = document.getElementById('m-cat').value.trim() || 'ทั่วไป';
  if (!t) { document.getElementById('m-title').focus(); return; }
  adding = true;
  const okBtn = document.getElementById('btn-ok');
  okBtn.disabled = true; okBtn.textContent = 'กำลังบันทึก…';
  closeModal();
  await addCard(t, c);
  toast('✓ เพิ่มงานแล้ว');
  adding = false;
  okBtn.disabled = false; okBtn.textContent = 'เพิ่มงาน';
};

window.promote = async (col, id) => {
  const i = COL_KEYS.indexOf(col);
  if (i >= 2) return;
  await moveCard(col, id, COL_KEYS[i + 1]);
  toast('↑ ย้ายงานแล้ว');
};
window.demote = async (col, id) => {
  const i = COL_KEYS.indexOf(col);
  if (i <= 0) return;
  await moveCard(col, id, COL_KEYS[i - 1]);
  toast('↓ ย้ายกลับแล้ว');
};
window.del = async (col, id) => {
  if (!confirm('ลบงานนี้?')) return;
  await delCard(col, id);
  toast('🗑 ลบงานแล้ว');
};
window.switchPage = i => { curPage = i; render(); };
window.switchPlat = k => { curPlat = k; render(); };

/* keyboard */
document.getElementById('m-title').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('m-cat').focus(); });
document.getElementById('m-cat').addEventListener('keydown',   e => { if (e.key === 'Enter') confirmAdd(); });
document.getElementById('overlay').addEventListener('click',   e => { if (e.target === e.currentTarget) closeModal(); });

/* ── SVG ICONS ───────────────────────────────────────────────────── */
const IC = {
  check:  `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  upload: `<svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`,
  undo:   `<svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>`,
  trash:  `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`,
  plus:   `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  tag:    `<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
};

/* ── RENDER ──────────────────────────────────────────────────────── */
function renderPlatRow() {
  document.getElementById('plat-row').innerHTML = PLATS.map(p => `
    <button class="plat-pill${curPlat === p.key ? ' active' : ''}" onclick="switchPlat('${p.key}')">
      <span style="color:${curPlat === p.key ? 'inherit' : p.color}">${p.svg}</span>
      ${esc(p.label)}
      <span class="pill-cnt">${totalFor(curPage, p.key)}</span>
    </button>`).join('');
}

function render() {
  /* page tabs */
  document.getElementById('page-tabs').innerHTML = PAGES.map((pg, i) =>
    `<button class="page-tab${i === curPage ? ' active' : ''}" onclick="switchPage(${i})">${pg}</button>`
  ).join('');

  renderPlatRow();

  /* stat strip */
  const td = cards(curPage, curPlat, 'todo');
  const dn = cards(curPage, curPlat, 'done');
  const po = cards(curPage, curPlat, 'posted');
  const tot = td.length + dn.length + po.length;
  document.getElementById('stat-strip').innerHTML = [
    ['#b4b2a9', `ค้างอยู่ ${td.length}`],
    ['#1D9E75', `เสร็จแล้ว ${dn.length}`],
    ['#185FA5', `โพสต์แล้ว ${po.length}`],
    [null,      `รวม ${tot} งาน`],
  ].map(([pip, label]) => `
    <div class="stat-chip">
      ${pip ? `<span class="stat-pip" style="background:${pip}"></span>` : ''}
      ${label}
    </div>`).join('');

  /* kanban */
  const colData = { todo: td, done: dn, posted: po };
  document.getElementById('kanban').innerHTML = COLS.map(col => {
    const list = colData[col.key];
    const isFirst = col.key === 'todo';
    const isLast  = col.key === 'posted';
    const promoteLabel = col.key === 'todo' ? 'เสร็จ' : 'โพสต์แล้ว';
    const promoteIcon  = col.key === 'todo' ? IC.check : IC.upload;

    const cardHTML = list.length === 0
      ? `<div class="empty-msg">ยังไม่มีงาน</div>`
      : list.map(t => `
          <div class="card">
            <div class="card-title">${esc(t.title)}</div>
            <div class="card-cat">${IC.tag} ${esc(t.cat)}</div>
            <div class="card-foot">
              <button class="btn btn-del" onclick="del('${col.key}','${t.id}')" title="ลบ">${IC.trash}</button>
              ${!isFirst ? `<button class="btn" onclick="demote('${col.key}','${t.id}')" title="ย้อนกลับ">${IC.undo}</button>` : ''}
              ${!isLast  ? `<button class="btn btn-promote" onclick="promote('${col.key}','${t.id}')">${promoteIcon} ${promoteLabel}</button>` : ''}
            </div>
          </div>`).join('');

    return `
      <div class="col">
        <div class="col-head">
          <span class="col-pip" style="background:${col.pip}"></span>
          ${col.label}
          <span class="col-n">${list.length}</span>
        </div>
        <div class="card-stack">${cardHTML}</div>
        <button class="add-btn" onclick="openModal('${col.key}')">${IC.plus} เพิ่มงานใหม่</button>
      </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
